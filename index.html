            font-size: 1.5rem;
            margin-bottom: 12px;
            letter-spacing: 1px;

        #unit-select p {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 14px;
        }
        .unit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .unit-btn {
            background: #e6edff;
            border: none;
            border-radius: 14px;
            padding: 14px 0;
            font-size: 1.05rem;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }
        .unit-btn:active {
            background: #cddbfc;
            transform: scale(0.94);
        }

        #game {
            display: none;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        #unitTitle {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1e293b;
        }

            border: none;
            color: #3b82f6;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
        }
        #gameMenuBtn:active {
            background: #eef2ff;
        }
        #progress {
            text-align: center;
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 12px;

            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 18px;
            line-height: 1.6;
            min-height: 2.8em;
            word-break: break-word;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .option-btn {
            background: #ffffff;
            border: 2px solid #dbe4f0;
            border-radius: 14px;
            padding: 16px 6px;
            font-size: 1rem;
            color: #1e293b;
            cursor: pointer;
            transition: 0.12s;
            text-align: center;
            word-break: break-word;
            line-height: 1.3;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .option-btn:active:not(:disabled) {
            background: #f1f5fe;
            transform: scale(0.96);
        }
        .option-btn.correct {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }
        .option-btn.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .option-btn:disabled {
            cursor: default;
            opacity: 0.85;
        }
        #feedback {
            text-align: center;
            margin: 12px 0 6px;
            font-weight: 600;
            font-size: 1.1rem;
            min-height: 2rem;
        }
        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }

            flex: 1;
            border: none;
            border-radius: 14px;
            padding: 14px 0;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.12s;
        }
        #next-btn {
            background: #3b82f6;
            color: #fff;
        }
        #next-btn:active {
            background: #2563eb;
        }
        #back-btn {
            background: #e5e7eb;
            color: #1f2937;
        }
        #back-btn:active {
            background: #d1d5db;
        }
        /* 结果页 */
        #result {
            display: none;
            text-align: center;
            padding: 20px 0 10px;
        }
        #result h2 {
            font-size: 2rem;
            margin-bottom: 12px;
        }
        #result p {
            font-size: 1.2rem;
            margin: 6px 0;
            color: #334155;
        }
        #scoreMsg {
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 12px;
            color: #0f172a;
        }
        .result-btns {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .result-btns button {
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;

            background: #e5e7eb;
            color: #1f2937;
        }
        .result-btns button:last-child:active {
            background: #d1d5db;
        }

            }

                grid-template-columns: repeat(2, 1fr);

                { question: "这个小岛远离城市。", options: ["This island is far away from the city.", "This island is far away city.", "This island is far from away city.", "This island is far away from city."], answer: "This island is far away from the city." }
            ]
        }, {
            title: "Unit 11",
            words: [
                { en: "festival", cn: "节日" },
                { en: "important", cn: "重要的" },
                { en: "call", cn: "把……叫做" },
                { en: "dumpling", cn: "饺子" },
                { en: "relative", cn: "亲戚" },
                { en: "red packet", cn: "红包" },
                { en: "firework", cn: "烟火；烟花" },
                { en: "monster", cn: "怪物" },
                { en: "end", cn: "结尾；结束" },
                { en: "village", cn: "村庄" },
                { en: "last", cn: "最后的" },
                { en: "firecracker", cn: "鞭炮；爆竹" },
                { en: "mooncake", cn: "月饼" },
                { en: "at the end of", cn: "在……的最后" }
            ],
            extra: [
                { question: "春节是中国最重要的节日。", options: ["The Spring Festival is the most important festival in China.", "Spring Festival is the most important festival in China.", "The Spring Festival is the more important festival in China.", "The Spring Festival is the importantest festival in China."], answer: "The Spring Festival is the most important festival in China." },
                { question: "在年底，我们放鞭炮。", options: ["At the end of the year, we set off firecrackers.", "In the end of the year, we set off firecrackers.", "At the end of year, we set off firecrackers.", "At the end of the year, we set off fireworks."], answer: "At the end of the year, we set off firecrackers." },
                { question: "我们叫这种食物为“饺子”。", options: ["We call this food \"dumpling\".", "We call this food \"dumplings\".", "We name this food \"dumpling\".", "We called this food \"dumpling\"."], answer: "We call this food \"dumpling\"." }
            ]
        }, {
            title: "Unit 12",
            words: [
                { en: "giant", cn: "巨人" },
                { en: "wall", cn: "墙；围墙" },
                { en: "kind", cn: "友好的；体贴的" },
                { en: "through", cn: "穿过" },
                { en: "no entry", cn: "禁止进入" },
                { en: "(be) kind to", cn: "对……友好" },
                { en: "knock down", cn: "推倒；拆掉" }
            ],
            extra: [
                { question: "禁止进入花园。", options: ["No entry to the garden.", "No enter the garden.", "Not entry to the garden.", "Don't entry to the garden."], answer: "No entry to the garden." },
                { question: "这位巨人很友善，他让孩子们穿过花园。", options: ["The giant is kind, he lets the children through the garden.", "The giant is kind, he let the children through the garden.", "The giant is kind, he allows the children to go through garden.", "The giant kind, he lets the children through the garden."], answer: "The giant is kind, he lets the children through the garden." },
                { question: "工人们推倒了墙。", options: ["The workers knocked down the wall.", "The workers knock down the wall.", "The workers knocked down wall.", "The workers knocked the wall."], answer: "The workers knocked down the wall." }
            ]
        }];

        // ========== 工具 ==========
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ========== 生成单词题目 ==========
        function genWordQuestions(words) {
            const questions = [];
            words.forEach((word, idx) => {
                const dir = idx % 2 === 0 ? 'en2cn' : 'cn2en';
                let qText, correctAns, otherField;
                if (dir === 'en2cn') {
                    qText = word.en;
                    correctAns = word.cn;
                    otherField = 'cn';
                } else {
                    qText = word.cn;
                    correctAns = word.en;
                    otherField = 'en';
                }
                const others = words.filter((_, i) => i !== idx);
                let distractors = [];
                if (others.length <= 3) {
                    distractors = others.map(w => w[otherField]);
                } else {
                    const shuffled = shuffle([...others]);
                    for (let i = 0; i < 3; i++) {
                        distractors.push(shuffled[i][otherField]);
                    }
                }
                // 确保选项够4个（一般够了）
                let options = [correctAns, ...distractors];
                questions.push({
                    question: qText,
                    options: options,
                    answer: correctAns
                });
            });
            return questions;
        }

        function buildUnitQuestions(unit) {
            const wordQs = genWordQuestions(unit.words);
            const extraQs = unit.extra.map(e => ({
                question: e.question,
                options: e.options.slice(), // 保持原始数组
                answer: e.answer
            }));
            const all = wordQs.concat(extraQs);
            return shuffle(all);
        }

        // ========== 状态 ==========
        let state = {
            currentUnitIdx: -1,
            questions: [],
            currentQIndex: 0,
            correct: 0,
            answered: false,
            totalQuestions: 0
        };

        // ========== DOM ==========
        const unitGrid = document.getElementById('unitGrid');
        const selectDiv = document.getElementById('unit-select');
        const gameDiv = document.getElementById('game');
        const resultDiv = document.getElementById('result');
        const unitTitleSpan = document.getElementById('unitTitle');
        const gameMenuBtn = document.getElementById('gameMenuBtn');
        const curQSpan = document.getElementById('curQ');
        const totalQSpan = document.getElementById('totalQ');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackDiv = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const backBtn = document.getElementById('back-btn');
        const correctCountSpan = document.getElementById('correctCount');
        const totalQResultSpan = document.getElementById('totalQResult');
        const scoreMsg = document.getElementById('scoreMsg');

        // ========== 界面函数 ==========
        function initMenu() {
            unitGrid.innerHTML = '';
            rawUnits.forEach((unit, idx) => {
                const btn = document.createElement('button');
                btn.className = 'unit-btn';
                btn.textContent = unit.title;
                btn.addEventListener('click', () => startUnit(idx));
                unitGrid.appendChild(btn);
            });
        }
        initMenu();

        function startUnit(idx) {
            state.currentUnitIdx = idx;
            state.questions = buildUnitQuestions(rawUnits[idx]);
            state.currentQIndex = 0;
            state.correct = 0;
            state.answered = false;
            state.totalQuestions = state.questions.length;
            unitTitleSpan.textContent = rawUnits[idx].title;
            selectDiv.style.display = 'none';
            gameDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            const q = state.questions[state.currentQIndex];
            curQSpan.textContent = state.currentQIndex + 1;
            totalQSpan.textContent = state.totalQuestions;
            questionText.textContent = q.question;
            // 打乱选项
            let opts = [...q.options];
            shuffle(opts);
            const correctIdx = opts.indexOf(q.answer);
            optionsContainer.innerHTML = '';
            opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.dataset.index = i;
                btn.addEventListener('click', () => handleOptionClick(i, correctIdx, btn));
                optionsContainer.appendChild(btn);
            });
            feedbackDiv.innerHTML = '';
            nextBtn.style.display = 'none';
            backBtn.style.display = 'none';
            state.answered = false;
        }

        function handleOptionClick(selectedIdx, correctIdx, clickedBtn) {
            if (state.answered) return;
            state.answered = true;
            const allBtns = optionsContainer.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);
            allBtns.forEach((b, idx) => {
                if (idx === correctIdx) b.classList.add('correct');
                else if (idx === selectedIdx && selectedIdx !== correctIdx) b.classList.add('wrong');
            });
            if (selectedIdx === correctIdx) {
                feedbackDiv.innerHTML = '<span style="color:#10b981;">✅ 正确!</span>';
                state.correct++;
            } else {
                const correctText = allBtns[correctIdx].textContent;
                feedbackDiv.innerHTML = `<span style="color:#ef4444;">❌ 正确答案: ${correctText}</span>`;
            }
            // 下一题或结果
            if (state.currentQIndex < state.totalQuestions - 1) {
                nextBtn.style.display = 'block';
                backBtn.style.display = 'none';
            } else {
                nextBtn.style.display = 'none';
                backBtn.style.display = 'block';
                backBtn.textContent = '查看结果';
                backBtn.onclick = showResult;
            }
        }

        nextBtn.addEventListener('click', () => {
            if (state.answered && state.currentQIndex < state.totalQuestions - 1) {
                state.currentQIndex++;
                showQuestion();
            }
        });

        function showResult() {
            gameDiv.style.display = 'none';
            resultDiv.style.display = 'block';
            correctCountSpan.textContent = state.correct;
            totalQResultSpan.textContent = state.totalQuestions;
            const pct = Math.round(state.correct / state.totalQuestions * 100);
            let msg = '';
            if (pct === 100) msg = '🌟 完美！全部正确！';
            else if (pct >= 80) msg = '👏 优秀！继续保持！';
            else if (pct >= 60) msg = '👍 不错，再强化一下！';
            else msg = '💪 加油，多练几次会更好！';
            scoreMsg.textContent = msg;
        }

        function backToMenu() {
            selectDiv.style.display = 'block';
            gameDiv.style.display = 'none';
            resultDiv.style.display = 'none';
            state = { currentUnitIdx: -1, questions: [], currentQIndex: 0, correct: 0, answered: false, totalQuestions: 0 };
        }

        function restartUnit() {
            if (state.currentUnitIdx >= 0) {
                resultDiv.style.display = 'none';
                gameDiv.style.display = 'block';
                startUnit(state.currentUnitIdx);
            }
        }

        gameMenuBtn.addEventListener('click', backToMenu);
    </script>
</body>
